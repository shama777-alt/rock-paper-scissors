<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>

  <body>
    <p>Rock Paper Scissors</p>

    <button
      onclick="
        const randomNumber = Math.random();
        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'Rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'Paper';
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'Scissors';
        }
        console.log(computerMove);

        let result = '';
        if (computerMove === 'Rock') {
          result = 'tie';
        } else if (computerMove === 'Paper') {
          result = 'You lose';
        } else if (computerMove === 'Scissors') {
          result = 'You win';
        }
        alert(
          `You picked rock,the computer picked ${computerMove}. ${result} `,
        );
      "
    >
      Rock
    </button>

      //scopes are important here, as the computerMove variable is declared inside the if statements, it will not be accessible outside of those blocks. To fix this, you can declare the computerMove variable outside of the if statements and then assign it a value based on the random number generated. This way, you can access the computerMove variable after the if statements to determine the winner of the game.
