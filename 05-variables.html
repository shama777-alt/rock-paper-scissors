<!doctype html>
<title>Variables</title>

   
  </head>

  <body>
    

    <script>
      let variable1 = 3;
      console.log(2);
      let calculation = 2+2;
      console.log(calculation);
      console.log(calculation + 2);
      let result = calculation + 2;
      console.log(result);
      let message = 'hello';
      console.log(message); console.log(message + ' world');

// let is used to declare a variable that can be reassigned later.
//semicolon is optional in JavaScript, but it is a good practice to use it to avoid potential issues with automatic semicolon insertion.
// reassignment means that you can change the value of a variable after it has been declared. For example, you can do variable1 = 5; after declaring variable1 with let.

variable1 = 5; // This is an example of reassignment
console.log(variable1); // This will output 5
//when reassigning a variable, you simply use the variable name followed by the assignment operator (=) and the new value you want to assign to it. In this case, we are changing the value of variable1 from 3 to 5.
varriable1 = variable1 + 1;
console.log(varriable1);

//typeof operator is used to determine the type of a variable or expression. It returns a string indicating the type of the operand. For example, if you have a variable called message that contains a string value, you can use typeof message to check its type, which will return "string". This can be useful for debugging and ensuring that your variables are of the expected type before performing operations on them.

console.log(typeof variable1); // This will output "number"
console.log(typeof message); // This will output "string"
    
    </script>
  </body>
</html>
